# ============================================
# VetCare - QR Code Service Configuration
# ============================================

spring.application.name=qr-code-service
server.port=8087

# ── Database ────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/vetcare_qr_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka Discovery ─────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── QR Code Settings ─────────────────────────
qr.code.width=300
qr.code.height=300
qr.code.format=PNG
