spring.application.name=api-gateway
server.port=8080

# Eureka ekata connect wima
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT Secret
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# --- Routes Configuration ---

# 1. Auth Service Route (Mekata token one na, e nisa filter damma na)
spring.cloud.gateway.routes[0].id=user-auth-service
spring.cloud.gateway.routes[0].uri=lb://USER-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. Employee Service Route (Mekata token eka awashyai, e nisa filter eka add kara)
spring.cloud.gateway.routes[1].id=employee-service
spring.cloud.gateway.routes[1].uri=lb://EMPLOYEE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/employees/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

